<svg xmlns="http://www.w3.org/2000/svg" width="580" height="120">
  <rect width="580" height="120" rx="8" fill="#FAFBFC" stroke="#B8C0CC" stroke-width="1"/>
  <text x="16" y="24" font-family="monospace" font-size="11" fill="#616E7C">Light Mode Backgrounds</text>
  <!-- Daylight - background -->
  <rect x="16" y="36" width="80" height="50" rx="6" fill="#FAFBFC" stroke="#B8C0CC" stroke-width="1"/>
  <text x="56" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Daylight</text>
  <text x="56" y="112" font-family="monospace" font-size="8" fill="#616E7C" text-anchor="middle">#FAFBFC</text>
  <!-- Frost - backgroundPanel -->
  <rect x="112" y="36" width="80" height="50" rx="6" fill="#F5F7FA" stroke="#B8C0CC" stroke-width="1"/>
  <text x="152" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Frost</text>
  <text x="152" y="112" font-family="monospace" font-size="8" fill="#616E7C" text-anchor="middle">#F5F7FA</text>
  <!-- Snow - backgroundElement -->
  <rect x="208" y="36" width="80" height="50" rx="6" fill="#ECEFF4" stroke="#B8C0CC" stroke-width="1"/>
  <text x="248" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Snow</text>
  <text x="248" y="112" font-family="monospace" font-size="8" fill="#616E7C" text-anchor="middle">#ECEFF4</text>
  <!-- Accents -->
  <rect x="320" y="36" width="36" height="50" rx="6" fill="#5E81AC"/>
  <text x="338" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Fjord</text>
  <rect x="364" y="36" width="36" height="50" rx="6" fill="#8FBCBB"/>
  <text x="382" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Pounamu</text>
  <rect x="408" y="36" width="36" height="50" rx="6" fill="#81A1C1"/>
  <text x="426" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Dusky</text>
  <rect x="452" y="36" width="36" height="50" rx="6" fill="#A3BE8C"/>
  <text x="470" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Bush</text>
  <rect x="496" y="36" width="36" height="50" rx="6" fill="#BF616A"/>
  <text x="514" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Pohut.</text>
  <rect x="540" y="36" width="28" height="50" rx="6" fill="#2E3440"/>
  <text x="554" y="100" font-family="monospace" font-size="9" fill="#2E3440" text-anchor="middle">Text</text>
</svg>
